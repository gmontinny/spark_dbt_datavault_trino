services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - spark_network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    hostname: schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_CONNECTION_URL: 'zookeeper:2181'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: ${KAFKA_BROKERS}
      SCHEMA_REGISTRY_DEBUG: 'true'
    networks:
      - spark_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    expose:
      - "9093"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_INTERNAL://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_INTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    networks:
      - spark_network

  starrocks-fe-0:
    image: starrocks/fe-ubuntu:latest
    hostname: starrocks-fe-0
    container_name: starrocks-fe-0
    command:
      - /bin/bash
      - -c
      - |
        /opt/starrocks/fe_entrypoint.sh starrocks-fe-0
    environment:
      - HOST_TYPE=FQDN
      - TZ=Asia/Shanghai
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
    ports:
      - "8030:8030"
      - "9020:9020"
      - "9030:9030"
    volumes:
       - singleton_fe0_data:/opt/starrocks/fe/meta
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9030"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - spark_network

  starrocks-be-0:
    image: starrocks/be-ubuntu:latest
    hostname: starrocks-be-0
    container_name: starrocks-be-0
    command:
      - /bin/bash
      - -c
      - |
        /opt/starrocks/be_entrypoint.sh starrocks-fe-0
    environment:
      - HOST_TYPE=FQDN
      - TZ=Asia/Shanghai
    ports:
      - "8040:8040"
    depends_on:
      - starrocks-fe-0
    volumes:
      - singleton_be0_data:/opt/starrocks/be/storage
    networks:
      - spark_network

  minio:
    container_name: minio
    image: quay.io/minio/minio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - './minio_data:/data'
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - MINIO_DOMAIN=storage
      - MINIO_REGION_NAME=${MINIO_REGION}
      - MINIO_REGION=${MINIO_REGION}
    command: server --console-address ":9001" /data
    networks:
      - spark_network

  minio-client:
    image: minio/mc:latest
    container_name: minio-client
    depends_on:
      - minio
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
      until (mc alias set myminio http://minio:9000 $MINIO_ACCESS_KEY $MINIO_SECRET_KEY); do echo 'waiting for minio...'; sleep 3; done;
      mc mb --ignore-existing myminio/spark-demo/stream-1/checkpoints;
      mc mb --ignore-existing myminio/warehouse;
      "
    networks:
      - spark_network

  superset:
    image: apache/superset:latest
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SUPERSET_DATABASE_URI=sqlite:////app/superset_home/superset.db
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    command: >
      /bin/sh -c "superset db upgrade &&
      superset fab create-admin --username admin --firstname Superset --lastname Admin --password ${SUPERSET_ADMIN_PASSWORD} --email admin@superset.com &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088 --with-threads --reload --debugger"
    restart: unless-stopped
    networks:
      - spark_network

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spark_network

  hive-metastore:
    build: ./hive-metastore
    container_name: hive-metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
        -Djavax.jdo.option.ConnectionUserName=${POSTGRES_USER}
        -Djavax.jdo.option.ConnectionPassword=${POSTGRES_PASSWORD}
    ports:
      - "9083:9083"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - spark_network

  trino:
    image: trinodb/trino:latest
    container_name: trino
    ports:
      - "${TRINO_PORT}:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    depends_on:
      hive-metastore:
        condition: service_healthy
    networks:
      - spark_network

  spark-connect:
    build: ./spark-connect
    container_name: spark-connect
    command:
      - /opt/spark/sbin/start-connect-server.sh
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.1,org.apache.hadoop:hadoop-aws:3.3.6,com.amazonaws:aws-java-sdk-bundle:1.12.262,com.mysql:mysql-connector-j:8.0.33
      - --conf
      - spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
      - --conf
      - spark.hadoop.fs.s3a.access.key=${MINIO_ACCESS_KEY}
      - --conf
      - spark.hadoop.fs.s3a.secret.key=${MINIO_SECRET_KEY}
    environment:
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "15002:15002"
      - "4040-4045:4040-4045"
    volumes:
      - ./data:/opt/spark/work-dir/data
      - spark-warehouse:/opt/spark/warehouse
      - spark-checkpoints:/tmp/spark-checkpoints
    depends_on:
      hive-metastore:
        condition: service_healthy
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - spark_network

  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: dev
    command: sleep infinity
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - uv-cache:/root/.cache/uv
      - spark-warehouse:/opt/spark/warehouse
    environment:
      PYSPARK_PYTHON: /workspace/.venv/bin/python
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BROKERS}
      SCHEMA_REGISTRY_URL: ${KAFKA_SCHEMA_REGISTRY}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      SPARK_CONNECT_URL: ${SPARK_CONNECT_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      TRINO_HOST: ${TRINO_HOST}
      TRINO_PORT: ${TRINO_PORT}
    depends_on: [kafka, schema-registry, minio, spark-connect, trino]
    networks: [spark_network]

networks:
  spark_network:
    driver: bridge
    external: false

volumes:
  singleton_fe0_data:
  singleton_be0_data:
  superset_home:
  uv-cache:
  spark-warehouse:
  spark-checkpoints:
  conf:
  postgres_data:
